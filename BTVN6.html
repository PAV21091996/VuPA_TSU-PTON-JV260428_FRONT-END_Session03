<!DOCTYPE html>
<html>
    <header>
        <title>Tạo table sử dụng thuộc tính rowspan</title>
    </header>
    <body>
        <main>
            <table border="1">
                <thead>
                    <th>Loại sản phẩm</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                </thead>
                <tbody>
                    <tr>
                        <td rowspan="2">Điện tử</td>
                        <td>Laptop</td>
                        <td>15.000.000</td>
                    </tr>
                    <tr>
                        <td>Điện thoại</td>
                        <td>8.000.000</td>
                    </tr>
                    <tr>
                        <td>Gia dụng</td>
                        <td>Máy giặt</td>
                        <td>5.000.000</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </body>
</html>
