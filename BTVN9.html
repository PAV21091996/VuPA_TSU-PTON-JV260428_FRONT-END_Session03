<!DOCTYPE html>
<html>
    <header>
        <title>Tạo form tìm kiếm và lọc sản phẩm</title>
    </header>
    <body>
        <main>
            <h1>Tìm kiếm sản phẩm</h1>
            <form action="https://www.myserver.com" method="post">
                <div>
                    <label for="Từ khóa tìm kiếm">Từ khóa tìm kiếm</label>
                    <br>
                    <input type="text" name="Từ khóa tìm kiếm" id="Từ khóa tìm kiếm">
                </div>
                <div>
                    <label for="Loại sản phẩm">Loại sản phẩm</label>
                    <br>
                    <select name="Loại sản phẩm" id="Loại sản phẩm">
                        <option value="">Điện tử</option>
                        <option value="">Gia dụng</option>
                        <option value="">Máy móc</option>
                        <option value="">Chất tẩy rửa</option>
                    </select>
                </div>
                <div>
                    <input type="submit" name="Gửi" id="Gửi" value="Gửi">
                </div>
            </form>
        </main>
    </body>
</html>
