<!DOCTYPE html>
<html>
    <header>
        <title>Tạo form thông tin sở thích</title>
    </header>
    <body>
        <main>
            <h1>Sở thích của bạn</h1>
            <form action="https://www.myserver.com" method="post">
                <div>
                    <label for="Họ và tên">Họ và tên</label>
                    <input type="text" name="Họ và tên" id="Họ và tên">
                </div>
                <div>
                    <label for="Email">Email</label>
                    <input type="email" name="Email" id="Email">
                </div>
                <div>
                    <label for="Sở thích">Sở thích</label>
                    <input type="checkbox" name="Sở thích" id="Thể thao" value="Thể thao">Thể thao
                    <input type="checkbox" name="Sở thích" id="Âm nhạc" value="Âm nhạc">Âm nhạc
                    <input type="checkbox" name="Sở thích" id="Đọc sách" value="Đọc sách">Đọc sách
                    <br>
                    <input type="checkbox" name="Sở thích" id="Lướt web" value="Lướt web">Lướt web
                    <input type="checkbox" name="Sở thích" id="Chơi game" value="Chơi game">Chơi game
                    <input type="checkbox" name="Sở thích" id="Điện ảnh" value="Điện ảnh">Điện ảnh
                    <br>
                    <input type="checkbox" name="Sở thích" id="Du lịch" value="Du lịch">Du lịch
                </div>
                <div>
                    <input type="submit" name="Gửi thông tin" id="Gửi thông tin" value="Gửi thông tin">
                    <input type="reset" name="Nhập lại" id="Nhập lại" value="Nhập lại">
                </div>
            </form>
        </main>
    </body>
</html>
