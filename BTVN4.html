<!DOCTYPE html>
<html>
    <header>
        <title>Tạo một table đơn giản</title>
    </header>
    <body>
        <main>
            <table border="1">
                <thead>
                    <th>Tên</th>
                    <th>Tuổi</th>
                    <th>Nghề nghiệp</th>
                </thead>
                <tbody>
                    <tr>
                        <td>An</td>
                        <td>25</td>
                        <td>Lập trình viên</td>
                    </tr>
                    <tr>
                        <td>Bảo</td>
                        <td>30</td>
                        <td>Kỹ sư xây dựng</td>
                    </tr>
                    <tr>
                        <td>Chi</td>
                        <td>22</td>
                        <td>Sinh viên</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </body>
</html>
