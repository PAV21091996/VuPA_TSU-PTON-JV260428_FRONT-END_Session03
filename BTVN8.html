<!DOCTYPE html>
<html>
    <header>
        <title>Tạo trang form liên hệ</title>
    </header>
    <body>
        <main>
            <h1>Liên hệ với chúng tôi</h1>
            <form action="https://www.myserver.com" method="post">
                <div>
                    <label for="text">Họ và tên</label>
                    <input type="text" name="Họ và tên" id="Họ và tên" placeholder="Nguyen Van A">
                </div>
                <div>
                    <label for="Email">Email</label>
                    <input type="email" name="Email" id="Email">
                </div>
                <div>
                    <label for="text">Tin nhắn</label>
                    <input type="text" name="Tin nhắn" id="Tin nhắn">
                </div>
                <div>
                    <input type="submit" name="Gửi" id="Gửi" value="Gửi">
                </div>
            </form>
        </main>
    </body>
</html>
